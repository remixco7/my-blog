baseurl      = "https://remixco.org/"
languageCode = "zh-cn"
title        = "Remixco's Lab"
hasCJKLanguage = true

[outputs]
    home = ["HTML", "RSS", "JSON"]
    page = ["HTML"]
    section = ["HTML"]

[pagination]
    pageSize = 5

[params.search]
    enabled = true
    type = "json"
    indexURL = "/index.json"

[params.label]
    text = "Remixco's Lab"
    icon = "/images/avatar.png" # 对应 static/images/avatar.png
    iconHeight = 35

[params.profileMode]
    enabled = false 
    imageUrl = "/images/avatar.png"

[params.sidebar.avatar]
    src = "avatar.png" # 如果放在 assets 根目录
