<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单节点转 Surge 托管配置工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <div class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-8">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Surge 节点转换器</h1>
                <p class="text-gray-500 text-sm">将纯净的 SS / Trojan 节点链接，一键转换为 Surge 支持的托管配置订阅源。</p>
            </div>

            <div class="mb-6">
                <label for="nodeInput" class="block text-sm font-medium text-gray-700 mb-2">输入原始节点链接</label>
                <textarea id="nodeInput" rows="3" class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors resize-none" placeholder="请粘贴 trojan:// 或 ss:// 开头的链接..."></textarea>
            </div>

            <button onclick="generateSubscription()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md mb-8">
                生成 Surge 托管订阅
            </button>

            <div id="resultArea" class="hidden bg-gray-50 p-6 rounded-lg border border-gray-200">
                <h3 class="text-sm font-semibold text-gray-700 mb-3">您的专属订阅 API 链接：</h3>
                
                <div class="flex items-center space-x-2 mb-4">
                    <input type="text" id="apiUrlOutput" readonly class="flex-1 bg-white border border-gray-300 text-gray-600 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
                    <button onclick="copyUrl()" class="px-4 py-2.5 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-medium rounded-lg transition-colors">
                        复制
                    </button>
                </div>

                <a id="importBtn" href="#" class="block w-full text-center bg-black hover:bg-gray-800 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md">
                    ⚡️ 一键导入至 Surge
                </a>
                
                <p class="text-xs text-gray-400 mt-4 text-center">声明：本工具转换过程在边缘节点实时进行，不记录、不存储任何用户节点信息。</p>
            </div>
            
        </div>
    </div>

    <script>
        // 这是你刚刚部署的 API 地址
        const WORKER_API_BASE = "https://surge-converter.remixco77.workers.dev/";

        function generateSubscription() {
            const rawUrl = document.getElementById('nodeInput').value.trim();
            const resultArea = document.getElementById('resultArea');
            const apiUrlOutput = document.getElementById('apiUrlOutput');
            const importBtn = document.getElementById('importBtn');

            if (!rawUrl) {
                alert("请先输入节点链接！");
                return;
            }

            if (!rawUrl.startsWith('ss://') && !rawUrl.startsWith('trojan://')) {
                alert("目前仅支持 ss:// 或 trojan:// 协议！");
                return;
            }

            // 拼接出完整的 API 请求链接
            // 注意：要对用户输入的链接进行 URI 编码，防止特殊字符报错
            const finalApiUrl = `${WORKER_API_BASE}?url=${encodeURIComponent(rawUrl)}`;

            // 填充到结果框
            apiUrlOutput.value = finalApiUrl;

            // 生成 Surge 的 URL Scheme 一键导入链接
            const surgeScheme = `surge:///install-config?url=${encodeURIComponent(finalApiUrl)}`;
            importBtn.href = surgeScheme;

            // 显示结果区域
            resultArea.classList.remove('hidden');
        }

        function copyUrl() {
            const copyText = document.getElementById("apiUrlOutput");
            copyText.select();
            copyText.setSelectionRange(0, 99999); // 适配手机端
            navigator.clipboard.writeText(copyText.value).then(() => {
                alert("API 链接已复制到剪贴板！可以直接去 Surge 添加托管配置了。");
            });
        }
    </script>
</body>
</html>
